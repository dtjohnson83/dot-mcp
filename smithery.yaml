name: DOT/FMCSA Compliance MCP
description: Query DOT/FMCSA trucking regulations (49 CFR Parts 350-399, Hazardous Materials, Hours of Service, CSA BASIC categories) with plain-English summaries. Covers HOS rules, violation codes, penalty info, hazmat classes, and CSA categories.
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      SUPABASE_URL:
        type: string
        description: "Supabase project URL"
      SUPABASE_ANON_KEY:
        type: string
        description: "Supabase anonymous key"
    required:
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
  commandFunction: |-
    (config) => ({
      command: "node",
      args: ["dist-server/index.js"],
      env: {
        SUPABASE_URL: config.SUPABASE_URL,
        SUPABASE_ANON_KEY: config.SUPABASE_ANON_KEY
      }
    })
